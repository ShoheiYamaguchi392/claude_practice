services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - pnpm_store:/workspace/.pnpm-store
    environment:
      API_BASE_URL: http://api:3001
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    ports:
      - "3000:3000"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
      - pnpm_store:/workspace/.pnpm-store
    environment:
      WEB_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"

volumes:
  root_node_modules:
  web_node_modules:
  api_node_modules:
  shared_node_modules:
  pnpm_store:
